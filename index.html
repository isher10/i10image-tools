<!DOCTYPE html>
<html lang="en">
<style>

#splash-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
transition:opacity 1s ease;
}

#splash-screen.hide{
opacity:0;
}

#logo{
width:300px;
animation:logoZoom 2s ease;
}

@keyframes logoZoom{
0%{
transform:scale(0.1);
opacity:0;
}
50%{
transform:scale(1.1);
}
100%{
transform:scale(1);
opacity:1;
}
}

#logo-text{
font-size:60px;
font-weight:bold;
margin-top:10px;
display:flex;
align-items:center;
}

#idot{
opacity:0;
color:#00AEEF;
animation:showDot 0.8s forwards;
animation-delay:2s;
}

#iline{
opacity:0;
color:#00AEEF;
margin-left:3px;
animation:showLine 0.8s forwards;
animation-delay:3s;
}

#ten{
opacity:0;
color:#F04A3A;
margin-left:4px;
animation:showTen 0.8s forwards;
animation-delay:4s;
}

#subtitle{
font-size:18px;
letter-spacing:2px;
margin-top:5px;
opacity:0;
animation:showSubtitle 1s forwards;
animation-delay:5s;
}

@keyframes showDot{
0%{opacity:0; transform:translateY(-10px);}
100%{opacity:1; transform:translateY(0);}
}

@keyframes showLine{
0%{opacity:0; transform:translateY(10px);}
100%{opacity:1; transform:translateY(0);}
}

@keyframes showTen{
0%{opacity:0; transform:scale(0.5);}
100%{opacity:1; transform:scale(1);}
}

@keyframes showSubtitle{
0%{opacity:0; transform:translateY(10px);}
100%{opacity:1; transform:translateY(0);}
}

</style>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<meta name="google-site-verification" content="O4O1SCRxXh8TZaxyXWazl1Gc3qCtexGHpGTQoXHMAWc" />
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7802948704527757"
crossorigin="anonymous"></script>

<title>i10Image Tools - Reduce Image Size</title>
<meta name="description" content="i10Image Tools is a free online website to compress, resize and convert images easily.">

<meta name="keywords" content="image compressor, reduce image size, resize image online, convert image to jpg, convert image to png">

<link rel="stylesheet" href="style.css">

</head>

<script>

setTimeout(function(){
document.getElementById("splash-screen").classList.add("hide");
},6000);

setTimeout(function(){
document.getElementById("splash-screen").style.display="none";
},7000);

</script>

<body>

<div id="splash-screen">

<img src="logo.png" id="logo">

<div id="logo-text">
<span id="idot">•</span>
<span id="iline">I</span>
<span id="ten">10</span>
</div>

<p id="subtitle">IMAGE TOOLS</p>

</div>
